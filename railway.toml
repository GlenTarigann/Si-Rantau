[build]
builder = "NIXPACKS"

[deploy]
# Nixpacks akan otomatis menggunakan Nginx / Caddy untuk Laravel, 
# jadi kita tidak perlu meng-override startCommand.
# startCommand = "..." 

[deploy.releaseCommand]
# Perintah ini dijalankan setelah build selesai namun sebelum aplikasi menerima traffic.
# Sangat cocok untuk menjalankan cache production dan migrasi jika diperlukan (opsional).
# Karena Anda memiliki file SQL terpisah, kita hanya melakukan caching dan storage link.
command = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan storage:link"
